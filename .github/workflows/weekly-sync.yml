name: Weekly anime list sync

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to process (comma-separated, e.g. 2010,2011,...,2026)'
        required: false
  push:
    branches: [main]
    paths:
      - '.github/workflows/weekly-sync.yml'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go build ./cmd/anilistgen

      - name: Set years
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            echo "ALG_ANILIST_YEARS=${{ github.event.inputs.years }}" >> $GITHUB_ENV
          fi

      - run: ./anilistgen -output ./out
        env:
          ALG_ANILIST_YEARS: ${{ env.ALG_ANILIST_YEARS }}

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: true
          cname: lists.calmcacil.dev
