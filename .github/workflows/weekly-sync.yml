name: Weekly anime list sync

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to process (comma-separated, e.g. 2010,2011,...,2026). Leave empty for current year only.'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/anilistgen

      - name: Set years
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            echo "ALG_ANILIST_YEARS=${{ github.event.inputs.years }}" >> $GITHUB_ENV
          else
            # Default to current year; append next year so winter-<next>.json
            # is always pre-warmed for the season grid.
            this_year=$(date +%Y)
            next_year=$(( this_year + 1 ))
            echo "ALG_ANILIST_YEARS=$this_year,$next_year" >> $GITHUB_ENV
          fi

      - name: Collect existing years from gh-pages
        run: |
          git fetch origin gh-pages --depth=1
          years=$(git ls-tree -d --name-only origin/gh-pages | grep '^[0-9]\{4\}$' | paste -sd,)
          if [ -n "$years" ]; then
            echo "ALG_INDEX_YEARS=$years" >> $GITHUB_ENV
          fi

      - run: ./anilistgen -output ./out
        env:
          ALG_ANILIST_YEARS: ${{ env.ALG_ANILIST_YEARS }}
          ALG_INDEX_YEARS: ${{ env.ALG_INDEX_YEARS }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: true
          cname: lists.calmcacil.dev
