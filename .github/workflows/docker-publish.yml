name: CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile*'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-publish.yml'
      - '.goreleaser.yaml'
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile*'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-publish.yml'
      - '.goreleaser.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/anilistgen

  # Release binaries, Docker images, and GitHub release via goreleaser.
  # Triggered by tag pushes (auto-created by the svu step on main branch pushes).
  release:
    needs: [test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pre-pull base image to cache it locally and avoid Docker Hub
      # rate limits when buildx tries to pull it during goreleaser.
      - name: Pre-pull base image
        run: docker pull gcr.io/distroless/base-debian12:nonroot

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Auto-tag new versions on main branch pushes using conventional commits.
  tag:
    needs: [test]
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install svu
        run: go install github.com/caarlos0/svu@latest

      - name: Determine version
        id: version
        run: |
          current="$(svu current)"
          next="$(svu next)"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$next" ]; then
            echo "No version bump needed (current=${current}, next=${next})"
            echo "version_unchanged=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${next}" >> "$GITHUB_OUTPUT"
            echo "version_unchanged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-tag new version
        if: steps.version.outputs.version_unchanged == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" \
            -m "release: ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
