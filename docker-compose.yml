services:
  sonarr-seasonal:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - seasonal-data:/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Prewarm current year's anime on startup (defaults to current year)
      # - PREWARM_YEARS=2026
      # Log level: debug, info, warn, error (default: info)
      # - LOG_LEVEL=debug

volumes:
  seasonal-data:
